name: Build & Release (unsigned adhoc)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          for candidate in /Applications/Xcode_26.1.1.app /Applications/Xcode_26.1.app /Applications/Xcode.app; do
            if [[ -d "$candidate" ]]; then
              sudo xcode-select -s "${candidate}/Contents/Developer"
              break
            fi
          done
          /usr/bin/xcodebuild -version
          swift --version

      - name: Build universal CodexBar.app (ad-hoc signed)
        env:
          CODEXBAR_SIGNING: adhoc
          ARCHES: "arm64 x86_64"
        run: ./Scripts/package_app.sh release

      - name: Package zip
        run: |
          set -euo pipefail
          ditto -c -k --sequesterRsrc --keepParent CodexBar.app CodexBar.zip
          shasum -a 256 CodexBar.zip | tee CodexBar.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexBar-${{ github.ref_name }}
          path: |
            CodexBar.zip
            CodexBar.zip.sha256

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CodexBar.zip
            CodexBar.zip.sha256
          generate_release_notes: true
          body: |
            Ad-hoc signed build (no Apple Developer ID). Strip the quarantine
            bit after downloading:

            ```bash
            xattr -dr com.apple.quarantine ~/Downloads/CodexBar.app
            ```

            ### Proxy-routed Claude usage

            Set these once (persists per-user login session; drop in a
            `LaunchAgent` plist for permanence):

            ```bash
            launchctl setenv CODEXBAR_CLAUDE_USAGE_BASE_URL https://<your-worker-domain>
            launchctl setenv CODEXBAR_CLAUDE_OAUTH_TOKEN '<PROXY_API_KEY>'
            ```

            Then fully quit and relaunch CodexBar.
